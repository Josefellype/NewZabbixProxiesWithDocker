networks:
  zabbix_proxy_net:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "false" 
      com.docker.network.bridge.enable_icc: "true"
    ipam:
      driver: default
      config:
        - subnet: 172.16.3.0/28
          gateway: 172.16.3.1

services:
  prx1_db:
      image: postgres:13-alpine
      container_name: zabbix-proxy1-db
      networks:
        zabbix_proxy_net:
          ipv4_address: 172.16.3.6 # Novo IP para o DB
      environment:
        - POSTGRES_DB=zabbix_proxy
        - POSTGRES_USER=zabbix
        - POSTGRES_PASSWORD=zabbix_db_prx1
      volumes:
        - ./g1/prx1/postgres_data:/var/lib/postgresql/data
      restart: unless-stopped
  prx1:
    build: .
    container_name: "zabbix-proxy1-stda-g1"
    restart: unless-stopped
    networks:
      zabbix_proxy_net:
        ipv4_address: 172.16.3.2
    environment:
      - ZBX_PROXYMODE=0
      - ZBX_SERVER_HOST=100.76.180.207:10051;172.16.9.78:10051
      - ZBX_HOSTNAME=prx1-stda-g1
      - ZBX_DEBUGLEVEL=3
      - ZBX_ENABLEREMOTECOMMANDS=1
      - ZBX_PROXYLOCALBUFFER=0
      - ZBX_PROXYCONFIGFREQUENCY=300
      - ZBX_DATASENDERFREQUENCY=1
      - ZBX_PROXYMEMORYBUFFERSIZE=64M
      - ZBX_STARTPOLLERS=30
      - ZBX_MAXCONCURRENTCHECKSPERPOLLER=1000
      - ZBX_STARTDISCOVERERS=1
      - ZBX_HOUSEKEEPINGFREQUENCY=1
      - ZBX_HISTORYCACHESIZE=30M
      - ZBX_STARTDBSYNCERS=2
      - ZBX_HISTORYINDEXCACHESIZE=8M
      - ZBX_TIMEOUT=30
      - ZBX_UNREACHABLEPERIOD=45
      - ZBX_UNAVAILABLEDELAY=60
      - ZBX_UNREACHABLEDELAY=15
      - ZBX_LOGSLOWQUERIES=3000
      - ZBX_STATSALLOWEDIP=127.0.0.1
      - ZBX_PROXYBUFFERMODE=hybrid
      - ZBX_STARTSNMPPOLLERS=30
      - ZBX_STARTPREPROCESSORS=4
      - ZBX_STARTPOLLERSUNREACHABLE=20
      - ZBX_STARTPINGERS=4
      - ZBX_CACHESIZE=60M
      - ZBX_PROXYOFFLINEBUFFER=24
      - ZBX_DB_TYPE=postgresql
      - ZBX_DB_HOST=172.16.3.6
      - ZBX_DB_PORT=5432
      - ZBX_DB_NAME=zabbix_proxy
      - ZBX_DB_USER=zabbix
      - ZBX_DB_PASSWORD=zabbix_db_prx1
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc:
        soft: 65536
        hard: 65536
    volumes:
      #- ./g1/prx1/db_data:/var/lib/zabbix/db_data
      - ./g1/prx1/alertscripts:/usr/lib/zabbix/alertscripts
      - ./g1/prx1/externalscripts:/usr/lib/zabbix/externalscripts
      - ./g1/prx1/enc:/var/lib/zabbix/enc
      - ./g1/prx1/mibs:/var/lib/zabbix/mibs
    cap_add:
      - NET_ADMIN
      - NET_RAW

